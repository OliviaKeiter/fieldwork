# Root config for the one-click "Deploy to Netlify" button in the README.
# The app lives in app/ (which has its own netlify.toml with the same
# command/publish, used when the base directory is set by hand in the UI).
[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 7 requires Node 22.12+.
  NODE_VERSION = "22"

# The deploy button prompts for these before the first build. Both come from
# your Supabase project's API settings — see README step 5.
[template.environment]
  PUBLIC_SUPABASE_URL = "Your Supabase project URL (https://<ref>.supabase.co)"
  PUBLIC_SUPABASE_ANON_KEY = "Your Supabase anon (publishable) key"
